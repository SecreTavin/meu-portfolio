<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Portfólio - OS</title>
  
  <link rel="stylesheet" href="https://unpkg.com/98.css">
  
  <style>
    /* Importar a fonte clássica do Windows (W95FA) */
    @font-face {
      font-family: 'W95FA';
      src: url('https://fonts.cdnfonts.com/s/72922/w95fa.woff') format('woff');
    }

    /* O Desktop com o papel de parede clássico */
    body {
      margin: 0;
      height: 100vh;
      font-family: 'W95FA', Tahoma, Arial, sans-serif;
      overflow: hidden; 
      
      /* Fundo clássico: Adicionado aspas na URL para evitar erro com o espaço */
      background-color: #008080; 
      background-image: url('./wallpaper xp.png');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* Grid para os ícones na área de trabalho */
    .desktop-icons {
      display: flex;
      flex-direction: column;
      gap: 25px;
      padding: 20px;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Estilo individual de cada ícone do desktop */
    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
      text-align: center;
      cursor: pointer;
      color: white;
      text-shadow: 1px 1px 2px black;
    }

    .icon img {
      width: 40px;
      height: 40px;
      margin-bottom: 5px;
    }

    .icon:active img {
      filter: brightness(0.5); 
    }

    /* Configuração base das janelas (escondidas por padrão) */
    .window {
      position: absolute;
      display: none; 
      box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    /* Ajuste de tamanho específico para as janelas */
    #janela-repos { width: 500px; top: 10%; left: 15%; }
    #janela-curriculo { width: 800px; top: 5%; left: 25%; } 
    #janela-monitoramento { width: 700px; top: 15%; left: 25%; }
    #janela-systempulse { width: 380px; top: 5%; left: 60%; }
    
    .iframe-container {
      height: 500px; 
      width: 100%;
      background: #fff;
      border: inset 2px;
      margin-top: 10px;
    }

    /* Conteúdo interno da pasta de repositórios */
    .folder-content {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 15px;
      background: white;
      min-height: 200px;
    }

    .repo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
    }
    
    .repo-item img { 
      width: 32px; 
      height: 32px; 
      margin-bottom: 4px;
    }

    /* Barra de tarefas fake embaixo */
    .taskbar {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 35px;
      background: #c0c0c0;
      border-top: 2px solid #dfdfdf;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;
      box-sizing: border-box;
      z-index: 9999;
    }

    .clock {
      border: inset 2px;
      padding: 2px 8px;
      font-size: 12px;
    }

    /* Estilo para o Mockup do iPhone (System Pulse) */
    .iphone-frame {
      width: 300px;
      height: 600px;
      border: 14px solid #111;
      border-radius: 36px;
      overflow: hidden;
      position: relative;
      margin: 10px auto;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      background-color: #000;
    }

    /* Estilo para quando a janela for maximizada */
    .window.maximized {
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: calc(100vh - 35px) !important; /* Estica até a barra de tarefas */
    }
    
    /* Faz o Iframe esticar junto com a tela maximizada */
    .window.maximized .iframe-container {
      height: calc(100vh - 120px) !important; 
    }
  </style>
</head>
<body>

  <div class="desktop-icons">
    <div class="icon" ondblclick="abrirJanela('janela-repos')">
      <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" alt="Pasta">
      <span>Meus Projetos</span>
    </div>

    <div class="icon" ondblclick="abrirJanela('janela-curriculo')">
      <img src="https://win98icons.alexmeub.com/icons/png/html-0.png" alt="Documento">
      <span>Currículo.html</span>
    </div>
  </div>

  <div class="window" id="janela-repos">
    <div class="title-bar" id="drag-repos">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" alt="icon" width="16" style="vertical-align: middle; margin-right: 4px;">
        Meus Projetos
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize" onclick="alternarMaximizacao('janela-repos')"></button>
        <button aria-label="Close" onclick="fecharJanela('janela-repos')"></button>
      </div>
    </div>
    <div class="window-body">
      <p style="margin: 0 0 10px 0;">C:\Users\Visitante\Projetos</p>
      
      <div class="folder-content border">
        
        <div class="repo-item" ondblclick="abrirJanela('janela-monitoramento')">
          <img src="https://win98icons.alexmeub.com/icons/png/network_internet_pcs_installer-2.png" alt="Exe">
          <div>Monitoramento</div>
        </div>

        <div class="repo-item" ondblclick="abrirJanela('janela-systempulse')">
          <img src="https://win98icons.alexmeub.com/icons/png/processor-0.png" alt="App">
          <div>SystemPulse</div>
        </div>

        <div class="repo-item">
          <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" alt="Pasta">
          <div>Projeto_3</div>
        </div>

      </div>
    </div>
  </div>

  <div class="window" id="janela-curriculo">
    <div class="title-bar" id="drag-curriculo">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/html-0.png" alt="icon" width="16" style="vertical-align: middle; margin-right: 4px;">
        Currículo - Internet Explorer
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize" onclick="alternarMaximizacao('janela-curriculo')"></button>
        <button aria-label="Close" onclick="fecharJanela('janela-curriculo')"></button>
      </div>
    </div>
    <div class="window-body">
      <div class="iframe-container">
        <iframe src="./curriculo.html" width="100%" height="100%" style="border: none; background: white;"></iframe>
      </div>
    </div>
  </div>

  <div class="window" id="janela-monitoramento">
    <div class="title-bar" id="drag-monitoramento">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/network_internet_pcs_installer-2.png" width="16" style="vertical-align: middle; margin-right: 4px;">
        Monitoramento - Google Chrome
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize" onclick="alternarMaximizacao('janela-monitoramento')"></button>
        <button aria-label="Close" onclick="fecharJanela('janela-monitoramento')"></button>
      </div>
    </div>
    <div class="window-body">
      <div class="iframe-container">
        <iframe src="https://example.com" width="100%" height="100%" style="border: none;"></iframe>
      </div>
    </div>
  </div>

  <div class="window" id="janela-systempulse">
    <div class="title-bar" id="drag-systempulse">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/processor-0.png" width="16" style="vertical-align: middle; margin-right: 4px;">
        System Pulse Emulator
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize" onclick="alternarMaximizacao('janela-systempulse')"></button>
        <button aria-label="Close" onclick="fecharJanela('janela-systempulse')"></button>
      </div>
    </div>
    <div class="window-body" style="background-color: #cacaca;">
      <div class="iphone-frame">
         <iframe src="https://example.com" width="100%" height="100%" style="border: none; background: white;"></iframe>
      </div>
    </div>
  </div>

  <div class="taskbar">
    <button style="font-weight: bold; display: flex; align-items: center; gap: 5px;">
      <img src="https://win98icons.alexmeub.com/icons/png/windows_slanted-1.png" width="16"> Iniciar
    </button>
    <div class="clock">18:50 PM</div>
  </div>

  <script>
    function abrirJanela(id) {
      const janela = document.getElementById(id);
      janela.style.display = 'block';
      trazerParaFrente(janela);
    }

    function fecharJanela(id) {
      document.getElementById(id).style.display = 'none';
      // Garante que a janela perca o modo tela cheia ao ser fechada
      document.getElementById(id).classList.remove('maximized');
    }

    let zIndexAtual = 10;
    function trazerParaFrente(elemento) {
      zIndexAtual++;
      elemento.style.zIndex = zIndexAtual;
    }

    function tornarArrastavel(elementoJanela, elementoBarraTitulo) {
      let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      
      elementoBarraTitulo.onmousedown = arrastarMouseDown;

      function arrastarMouseDown(e) {
        e.preventDefault();
        trazerParaFrente(elementoJanela);
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = pararArrastar;
        document.onmousemove = arrastarElemento;
      }

      function arrastarElemento(e) {
        // Impede o arrasto se a janela estiver maximizada
        if (elementoJanela.classList.contains('maximized')) return;
        
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        elementoJanela.style.top = (elementoJanela.offsetTop - pos2) + "px";
        elementoJanela.style.left = (elementoJanela.offsetLeft - pos1) + "px";
      }

      function pararArrastar() {
        document.onmouseup = null;
        document.onmousemove = null;
      }

      elementoJanela.onmousedown = () => trazerParaFrente(elementoJanela);
    }

    // Inicializando todas as 4 janelas para serem arrastáveis
    tornarArrastavel(document.getElementById('janela-repos'), document.getElementById('drag-repos'));
    tornarArrastavel(document.getElementById('janela-curriculo'), document.getElementById('drag-curriculo'));
    tornarArrastavel(document.getElementById('janela-monitoramento'), document.getElementById('drag-monitoramento'));
    tornarArrastavel(document.getElementById('janela-systempulse'), document.getElementById('drag-systempulse'));

    // Função para alternar entre tela cheia e tamanho normal
    function alternarMaximizacao(id) {
      const janela = document.getElementById(id);
      janela.classList.toggle('maximized'); // Adiciona ou remove a classe
      trazerParaFrente(janela); // Garante que a janela maximizada fique na frente
    }
  </script>

</body>
</html>
